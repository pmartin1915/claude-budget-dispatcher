<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a1b26">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fleet">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<title>Dispatcher Fleet</title>
<style>
  :root {
    --bg: #1a1b26; --surface: #24283b; --surface2: #292e42; --border: #414868;
    --text: #c0caf5; --text-dim: #565f89; --accent: #7aa2f7;
    --green: #9ece6a; --yellow: #e0af68; --red: #f7768e; --cyan: #7dcfff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    background: var(--bg); color: var(--text);
    padding: 16px; max-width: 600px; margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }
  h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }
  .health-banner {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 8px; margin-bottom: 14px;
    font-weight: 600; font-size: 13px;
  }
  .health-banner.healthy { background: rgba(158,206,106,0.1); border: 1px solid var(--green); color: var(--green); }
  .health-banner.idle { background: rgba(224,175,104,0.08); border: 1px solid var(--yellow); color: var(--yellow); }
  .health-banner.down { background: rgba(247,118,142,0.1); border: 1px solid var(--red); color: var(--red); }
  .health-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }
  .healthy .health-dot { background: var(--green); }
  .idle .health-dot { background: var(--yellow); }
  .down .health-dot { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .health-content { flex: 1; min-width: 0; }
  .health-counts {
    font-size: 10px; font-weight: 400; color: var(--text-dim);
    margin-top: 6px; padding-top: 6px;
    border-top: 1px solid rgba(192,202,245,0.08);
    letter-spacing: 0.02em;
    word-break: break-word;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; margin-bottom: 10px;
  }
  .card-title { font-size: 12px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .machine-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .machine-dot.ok { background: var(--green); }
  .machine-dot.warn { background: var(--yellow); }
  .machine-dot.err { background: var(--red); }
  .machine-dot.stale { background: var(--text-dim); }

  .row { display: flex; justify-content: space-between; font-size: 11px; padding: 3px 0; }
  .row .label { color: var(--text-dim); }
  .row .value { color: var(--text); }
  .row .value.success { color: var(--green); }
  .row .value.error { color: var(--red); }
  .row .value.warn { color: var(--yellow); }
  .row .value.accent { color: var(--accent); }

  .tag {
    display: inline-block; font-size: 10px; padding: 1px 6px;
    border-radius: 3px; font-weight: 500;
  }
  .tag.ok { background: rgba(158,206,106,0.15); color: var(--green); }
  .tag.warn { background: rgba(224,175,104,0.12); color: var(--yellow); }
  .tag.err { background: rgba(247,118,142,0.12); color: var(--red); }
  .tag.dim { background: var(--surface2); color: var(--text-dim); }

  .error-hint {
    font-size: 10px; color: var(--text-dim); font-style: italic;
    margin-top: 4px; padding: 4px 8px;
    border-left: 2px solid var(--text-dim);
    word-break: break-word;
  }

  /* Skip-reason chip (yellow tag inline with last-run row when machine is
     idling for a benign reason — daily-quota-reached, user-active, etc). */
  .skip-hint {
    font-size: 10px; color: var(--text-dim); font-style: italic;
    margin-top: 4px; padding: 4px 8px;
    border-left: 2px solid var(--yellow);
    word-break: break-word;
  }

  /* Burn bar — visual gauge for weekly_pct / dispatches_today usage.
     Color tier matches the underlying gate semantics: <=80% green,
     80-100% yellow (approaching the floor), >100% red (over). */
  /* iOS Safari < 14.5 doesn't support flex `gap`; use margin-right on
     non-last children instead. Same pattern the rest of this file follows. */
  .burn-bar-wrap {
    display: flex; align-items: center;
    font-size: 11px; padding: 3px 0;
  }
  .burn-bar-wrap > *:not(:last-child) { margin-right: 8px; }
  .burn-bar-wrap .label { color: var(--text-dim); flex-shrink: 0; min-width: 100px; }
  .burn-bar {
    flex: 1; height: 6px; background: var(--surface2);
    border-radius: 3px; overflow: hidden; min-width: 60px;
  }
  .burn-bar-fill { height: 100%; transition: width 0.3s ease; }
  .burn-bar-fill.green { background: var(--green); }
  .burn-bar-fill.yellow { background: var(--yellow); }
  .burn-bar-fill.red { background: var(--red); }
  .burn-pct {
    font-size: 10px; flex-shrink: 0; min-width: 48px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .burn-pct.green { color: var(--green); }
  .burn-pct.yellow { color: var(--yellow); }
  .burn-pct.red { color: var(--red); }
  .burn-pct.dim { color: var(--text-dim); }

  .diag-drawer {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid rgba(192,202,245,0.08);
  }
  .diag-drawer summary {
    cursor: pointer; -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: rgba(122,162,247,0.1);
    font-size: 11px; color: var(--accent);
    list-style: none;
    min-height: 44px;
    display: flex; align-items: center;
  }
  .diag-drawer summary::-webkit-details-marker { display: none; }
  .diag-drawer summary::before {
    content: '\25B8'; color: var(--accent);
    margin-right: 6px; display: inline-block;
  }
  .diag-drawer[open] summary::before { content: '\25BE'; }
  .diag-drawer .field-label {
    font-size: 10px; color: var(--text-dim);
    margin-top: 6px; margin-bottom: 2px;
  }
  .diag-drawer pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 8px;
    font-family: inherit; font-size: 10px; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
    max-height: 200px; overflow: auto;
  }

  .pending-merges { margin-bottom: 14px; }
  .pm-header {
    font-size: 11px; font-weight: 600; color: var(--cyan);
    margin-bottom: 8px; letter-spacing: 0.04em;
  }
  .pm-entry {
    background: var(--surface); border: 1px solid var(--border);
    border-left-width: 3px;
    border-radius: 6px; padding: 10px 12px; margin-bottom: 8px;
    font-size: 11px;
  }
  .pm-entry.inflight { border-left-color: var(--cyan); }
  .pm-entry.clean { border-left-color: var(--green); }
  .pm-entry.suspended { border-left-color: var(--red); }
  .pm-title {
    font-weight: 600; margin-bottom: 4px; color: var(--text);
    word-break: break-all;
  }
  .pm-line {
    font-size: 10px; color: var(--text-dim); padding: 2px 0;
  }
  .pm-line.green { color: var(--green); font-weight: 600; }
  .pm-line.red { color: var(--red); font-weight: 600; }
  .pm-suspend-callout {
    margin-top: 6px; padding: 6px 8px;
    background: rgba(247,118,142,0.06);
    border-radius: 4px; color: var(--red); font-weight: 600;
    font-size: 10px;
  }
  .pm-entry details { margin-top: 6px; }
  .pm-entry summary {
    cursor: pointer; -webkit-user-select: none; user-select: none;
    font-size: 10px; color: var(--accent);
    list-style: none;
    min-height: 44px;
    display: flex; align-items: center;
    -webkit-tap-highlight-color: rgba(122,162,247,0.1);
  }
  .pm-entry summary::-webkit-details-marker { display: none; }
  .pm-entry summary::before {
    content: '\25B8'; color: var(--accent);
    margin-right: 6px; display: inline-block;
  }
  .pm-entry details[open] summary::before { content: '\25BE'; }
  .pm-tail-label {
    font-size: 10px; color: var(--text-dim);
    margin-top: 6px; margin-bottom: 2px;
  }
  .pm-entry pre {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 6px;
    font-family: inherit; font-size: 10px; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
    max-height: 150px; overflow: auto;
  }

  .refresh-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: var(--text-dim); margin-bottom: 14px;
  }
  .refresh-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--accent); font-size: 10px;
    padding: 4px 10px; cursor: pointer; font-family: inherit;
  }
  .refresh-btn:active { background: var(--surface2); }

  .install-btn {
    background: var(--accent); border: none; border-radius: 6px;
    color: var(--bg); font-size: 11px; font-weight: 600;
    padding: 6px 14px; cursor: pointer; font-family: inherit;
    display: none;
  }
  .install-btn:active { opacity: 0.8; }

  .error-box {
    background: rgba(247,118,142,0.08); border: 1px solid var(--red);
    border-radius: 6px; padding: 12px; font-size: 11px; color: var(--red);
    margin-bottom: 14px; display: none;
    word-break: break-word;
  }
  .error-box small { display: block; margin-top: 4px; color: var(--text-dim); font-size: 10px; }
  .footer { font-size: 10px; color: var(--text-dim); text-align: center; margin-top: 20px; }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<h1>Dispatcher Fleet</h1>
<div class="subtitle">Budget-aware autonomous dispatch across machines</div>

<div class="refresh-bar">
  <span id="lastRefresh">Loading...</span>
  <span>
    <button class="install-btn" id="installBtn" onclick="installPWA()">Install App</button>
    <button class="refresh-btn" onclick="refresh()">Refresh</button>
  </span>
</div>

<div class="error-box" id="errorBox"></div>
<div id="healthBanner"></div>
<div id="pendingMerges" class="pending-merges"></div>
<div id="machines"></div>

<div class="footer">
  <a href="https://gist.github.com/pmartin1915/655d02ce43b293cacdf333a301b63bbf" target="_blank" rel="noopener noreferrer">Raw gist data</a>
</div>

<script>
const GIST_ID = '655d02ce43b293cacdf333a301b63bbf';
const GIST_URL = `https://api.github.com/gists/${GIST_ID}`;
const STALE_HOURS = 4;

// Track last successful refresh so we can show staleness when a refresh fails.
let lastSuccessTs = null;

// === Helpers ===

function esc(s) {
  // HTML-escape for innerHTML interpolation. Defense-in-depth on gist-sourced data.
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function present(v) {
  return v != null && v !== '';
}

function safe(v, fallback) {
  return v == null || v === '' ? (fallback === undefined ? '—' : fallback) : v;
}

function formatDuration(ms) {
  if (ms < 0) return 'just now';
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ${mins % 60}m ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ${hrs % 24}h ago`;
}

function formatDurationShort(ms) {
  if (ms < 60000) return '<1m';
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ${mins % 60}m`;
  const days = Math.floor(hrs / 24);
  return `${days}d ${hrs % 24}h`;
}

function ago(ts) {
  if (!ts) return 'never';
  return formatDuration(Date.now() - new Date(ts).getTime());
}

function agoMs(tsMs) {
  if (!tsMs) return 'never';
  return formatDuration(Date.now() - tsMs);
}

function untilMs(tsMs) {
  if (!tsMs) return null;
  const ms = tsMs - Date.now();
  if (ms < 0) return `overdue ${formatDurationShort(-ms)}`;
  return `T+${formatDurationShort(ms)}`;
}

function isoLocal(ts) {
  if (!ts) return '';
  try { return new Date(ts).toLocaleString(); }
  catch { return String(ts); }
}

function parseFile(gist, name) {
  try { return JSON.parse(gist.files[name]?.content ?? '{}'); }
  catch { return {}; }
}

// === Refresh + status-aware error handling ===

async function refresh() {
  const errorBox = document.getElementById('errorBox');
  errorBox.style.display = 'none';
  errorBox.innerHTML = '';
  try {
    const res = await fetch(GIST_URL, { cache: 'no-store' });
    if (!res.ok) {
      const err = new Error(`HTTP ${res.status}`);
      err.status = res.status;
      err.statusText = res.statusText;
      const retryAfter = res.headers.get('retry-after');
      const reset = res.headers.get('x-ratelimit-reset');
      if (retryAfter) err.retryAfter = parseInt(retryAfter, 10);
      else if (reset) {
        const seconds = parseInt(reset, 10) - Math.floor(Date.now() / 1000);
        if (seconds > 0) err.retryAfter = seconds;
      }
      throw err;
    }
    const gist = await res.json();
    render(gist);
    lastSuccessTs = Date.now();
    document.getElementById('lastRefresh').textContent = `Updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    showRefreshError(errorBox, e);
  }
}

function showRefreshError(errorBox, e) {
  let detail;
  if (e.status === 403) {
    detail = 'HTTP 403 Forbidden — check gist visibility / token scope';
  } else if (e.status === 404) {
    detail = 'HTTP 404 Not Found — verify gist ID';
  } else if (e.status === 429) {
    detail = 'HTTP 429 Too Many Requests — rate limited';
    if (e.retryAfter) detail += `; retry after ${e.retryAfter}s`;
  } else if (e.status >= 500) {
    detail = `HTTP ${e.status}${e.statusText ? ' ' + e.statusText : ''} — GitHub API issue, retry shortly`;
  } else if (e.status) {
    detail = `HTTP ${e.status}${e.statusText ? ' ' + e.statusText : ''}`;
  } else {
    detail = `Network error: ${e.message || 'unknown'}`;
  }
  // Build via DOM (textContent) to avoid injection from exception messages.
  errorBox.innerHTML = '';
  const strong = document.createElement('strong');
  strong.textContent = 'Refresh failed';
  errorBox.appendChild(strong);
  errorBox.appendChild(document.createElement('br'));
  errorBox.appendChild(document.createTextNode(detail));
  if (lastSuccessTs) {
    const small = document.createElement('small');
    small.textContent = `Last success: ${agoMs(lastSuccessTs)}`;
    errorBox.appendChild(small);
  }
  errorBox.style.display = 'block';
}

// === Phase-specific error hints ===

function errorHint(reason, detail) {
  if (!present(reason)) return null;
  const r = String(reason);
  const combined = (r + ' ' + (detail || '')).toLowerCase();
  if (combined.includes('quota_exhausted')) {
    return 'Gemini daily quota hit. Will retry after free-tier reset.';
  }
  if (r === 'selector-failed') return 'Check GEMINI_API_KEY env / quota status.';
  if (r === 'worker-failed') return 'Worker phase. See "Phase" in Diagnostics for the gate.';
  if (r === 'verify-commit-failed') return 'Tests or typecheck failed in the project worktree.';
  if (r === 'gist-write-failed') return 'Status gist write failed. Check GIST_AUTH_TOKEN scope.';
  if (r === 'dispatch-locked') return 'Another machine is dispatching. Self-resolves in <15min.';
  return null;
}

// Skip-reason hints — explain WHY the gate blocked dispatch and what (if
// anything) the operator can do about it. These are benign skips, not
// errors, so they get a yellow chip rather than a red one. fleet must
// carry the new estimator fields (weekly_pct, weekly_hours_until_reset,
// dispatches_today, dispatches_today_max).
function skipReasonHint(fleet) {
  const r = fleet?.last_run_reason;
  if (!present(r)) return null;
  if (r === 'user-active') {
    return 'User active in last 20 min. Gate clears 20 min after last keystroke.';
  }
  if (r === 'paused') {
    return 'PAUSED sentinel file present. Operator must remove dev-ops/config/PAUSED to resume.';
  }
  if (r === 'daily-quota-reached') {
    const cap = present(fleet.dispatches_today_max) ? fleet.dispatches_today_max : '?';
    const used = present(fleet.dispatches_today) ? fleet.dispatches_today : '?';
    return `Daily quota ${used}/${cap} used. Resets at UTC midnight.`;
  }
  if (r === 'weekly-reserve-floor-threatened') {
    const pct = present(fleet.weekly_pct) ? `${Math.round(fleet.weekly_pct)}%` : '?';
    const hrs = present(fleet.weekly_hours_until_reset)
      ? `${Math.round(fleet.weekly_hours_until_reset)}h`
      : 'next week';
    return `Weekly burn at ${pct} (target 100%). Gate clears in ${hrs}.`;
  }
  if (r === 'trailing30-headroom-below-trigger') {
    const pct = present(fleet.monthly_pct) ? `${Math.round(fleet.monthly_pct)}%` : '?';
    return `30-day trailing burn at ${pct}; below the headroom-to-trigger threshold.`;
  }
  if (r === 'budget-below-headroom') {
    return 'Budget gate blocking — see weekly/monthly burn bars below.';
  }
  if (r === 'no-eligible-projects') {
    return 'All rotation projects are dirty, locked, or recently dispatched. Self-resolves.';
  }
  if (r === 'estimator-snapshot-parse-error') {
    return 'usage-estimate.json malformed. Re-run estimator manually to recover.';
  }
  if (r === 'insufficient-history-span' || r === 'insufficient-history-for-bootstrap') {
    return 'Not enough trailing-30 history yet. Cold-start; auto-clears as transcripts accumulate.';
  }
  return null;
}

// Burn bar — visual gauge for percent-of-target metrics (weekly burn,
// daily quota fill). Returns a DOM fragment. Color tier matches the gate
// semantics: <=80% green, 80-100% yellow, >100% red.
function buildBurnBar(label, pct, opts = {}) {
  const wrap = document.createElement('div');
  wrap.className = 'burn-bar-wrap';
  const lbl = document.createElement('span');
  lbl.className = 'label';
  lbl.textContent = label;
  wrap.appendChild(lbl);

  const bar = document.createElement('div');
  bar.className = 'burn-bar';
  const fill = document.createElement('div');
  fill.className = 'burn-bar-fill';
  // Cap visual width at 100% but let the numeric label show the true value.
  // Negative values (rare; e.g. headroom_pct) clamp to 0.
  const clamped = Math.max(0, Math.min(100, Number(pct)));
  fill.style.width = `${clamped}%`;
  let tier;
  if (pct > 100) tier = 'red';
  else if (pct >= (opts.warnAt ?? 80)) tier = 'yellow';
  else tier = 'green';
  fill.classList.add(tier);
  bar.appendChild(fill);
  wrap.appendChild(bar);

  const pctLabel = document.createElement('span');
  pctLabel.className = `burn-pct ${tier}`;
  // Display with one decimal for sub-100 values so 72.9% doesn't read as 73%.
  // Above 100% drop the decimal — "144%" is more legible than "143.97%".
  pctLabel.textContent = pct >= 100 ? `${Math.round(pct)}%` : `${Number(pct).toFixed(1)}%`;
  wrap.appendChild(pctLabel);
  return wrap;
}

// Daily-quota counter as a non-bar row (text-only; the cap can be 30+ so a
// 0-100 bar misrepresents the scale).
function buildQuotaRow(used, cap) {
  const row = document.createElement('div');
  row.className = 'row';
  const lbl = document.createElement('span');
  lbl.className = 'label';
  lbl.textContent = 'Daily quota';
  const val = document.createElement('span');
  val.className = 'value';
  if (present(cap) && cap > 0) {
    const ratio = used / cap;
    val.textContent = `${used}/${cap}`;
    if (ratio >= 1) val.classList.add('warn');
    else val.classList.add('accent');
  } else {
    val.textContent = String(used);
    val.classList.add('accent');
  }
  row.appendChild(lbl);
  row.appendChild(val);
  return row;
}

// Fleet-aggregate "last successful dispatch" — handles per-host health.json
// underreporting (last writer wins on the gist when multiple hosts compute
// from their own logs).
//
// MIRRORS scripts/lib/fleet.mjs:aggregateLastDispatch — keep in sync. The
// dashboard ships as static HTML to GitHub Pages with no build step, so the
// helper is duplicated rather than imported. Any logic change must land in
// both files. fleet.test.mjs covers the mjs side; manual smoke against the
// live gist covers the dashboard side.
function aggregateLastDispatch(fleetSnaps) {
  let bestTs = null, bestMachine = null, bestMs = -Infinity;
  for (const snap of fleetSnaps || []) {
    const ts = snap?.last_dispatch_ts;
    if (typeof ts !== 'string') continue;
    const ms = new Date(ts).getTime();
    if (!Number.isFinite(ms)) continue;
    if (ms > bestMs) { bestMs = ms; bestTs = ts; bestMachine = snap?.machine ?? null; }
  }
  return { ts: bestTs, machine: bestMachine };
}

// === Machine state + tags ===

function machineState(fleet) {
  if (!fleet.last_run_ts) return 'stale';
  const hrs = (Date.now() - new Date(fleet.last_run_ts).getTime()) / 3600000;
  if (fleet.consecutive_errors >= 3) return 'err';
  if (hrs > STALE_HOURS) return 'stale';
  if (fleet.last_run_outcome === 'skipped' && fleet.last_error_reason) return 'warn';
  return 'ok';
}

function outcomeTag(outcome) {
  if (!outcome) return '<span class="tag dim">none</span>';
  const cls = outcome === 'success' ? 'ok' : outcome === 'skipped' ? 'dim' : 'err';
  return `<span class="tag ${cls}">${esc(outcome)}</span>`;
}

// === Diagnostics drawer (DOM-built; uses textContent for gist-sourced data) ===

function buildDiagDrawer(fleet) {
  // Mount only when at least one error/diagnostic field is present.
  const hasError = present(fleet?.last_error_reason) || present(fleet?.last_error_phase);
  if (!hasError) return null;

  const details = document.createElement('details');
  details.className = 'diag-drawer';

  const summary = document.createElement('summary');
  summary.textContent = 'Diagnostics';
  details.appendChild(summary);

  const fields = [
    ['Phase', fleet.last_error_phase],
    ['Model', fleet.last_error_model],
    ['Retries', fleet.last_error_retries],
    ['When', present(fleet.last_error_ts)
      ? `${ago(fleet.last_error_ts)} (${isoLocal(fleet.last_error_ts)})`
      : null],
    ['Engine', fleet.last_engine],
    ['Wrapper', present(fleet.wrapper_duration_sec) ? `${fleet.wrapper_duration_sec}s` : null],
    ['Detail', fleet.last_error_detail],
  ];
  for (const [label, value] of fields) {
    if (!present(value)) continue;
    const row = document.createElement('div');
    row.className = 'row';
    const lbl = document.createElement('span');
    lbl.className = 'label';
    lbl.textContent = label;
    const val = document.createElement('span');
    val.className = 'value';
    val.textContent = String(value);
    row.appendChild(lbl);
    row.appendChild(val);
    details.appendChild(row);
  }

  if (present(fleet.last_error_message)) {
    const lbl = document.createElement('div');
    lbl.className = 'field-label';
    lbl.textContent = 'Message';
    details.appendChild(lbl);
    const pre = document.createElement('pre');
    pre.textContent = String(fleet.last_error_message);
    details.appendChild(pre);
  }

  return details;
}

// === Pending-merges panel ===

function renderPendingMerges(gist) {
  const container = document.getElementById('pendingMerges');
  container.innerHTML = '';
  const data = parseFile(gist, 'pending-merges.json');
  const entries = Array.isArray(data?.entries) ? data.entries : [];
  if (entries.length === 0) return;

  const inflight = entries.filter(e => e && !e.completed && e.next_deadline_ms != null);
  const clean = entries.filter(e => e && e.completed && e.outcome === 'replays-clean');
  const suspended = entries.filter(e => e && e.completed && e.outcome === 'auto-suspended');

  if (inflight.length === 0 && clean.length === 0 && suspended.length === 0) return;

  inflight.sort((a, b) => (a.next_deadline_ms || 0) - (b.next_deadline_ms || 0));

  const header = document.createElement('div');
  header.className = 'pm-header';
  header.textContent = `PENDING MERGES (${inflight.length} in flight, ${suspended.length} suspended)`;
  container.appendChild(header);

  for (const e of inflight) container.appendChild(buildPmEntry(e, 'inflight'));
  for (const e of suspended) container.appendChild(buildPmEntry(e, 'suspended'));
  for (const e of clean) container.appendChild(buildPmEntry(e, 'clean'));
}

function buildPmEntry(entry, kind) {
  const div = document.createElement('div');
  div.className = `pm-entry ${kind}`;

  const title = document.createElement('div');
  title.className = 'pm-title';
  title.textContent = `${safe(entry?.repo, '?')}#${safe(entry?.pr_number, '?')}`;
  div.appendChild(title);

  if (kind === 'inflight') {
    if (present(entry.project_slug)) {
      const proj = document.createElement('div');
      proj.className = 'pm-line';
      proj.textContent = `Project: ${entry.project_slug}`;
      div.appendChild(proj);
    }
    const total = Array.isArray(entry.replay_schedule_ms) ? entry.replay_schedule_ms.length : '?';
    const done = present(entry.replays_done) ? entry.replays_done : 0;
    const progress = document.createElement('div');
    progress.className = 'pm-line';
    progress.textContent = `Replays: ${done} / ${total}`;
    div.appendChild(progress);
    const next = untilMs(entry.next_deadline_ms);
    if (next) {
      const deadline = document.createElement('div');
      deadline.className = 'pm-line';
      deadline.textContent = `Next: ${next}`;
      div.appendChild(deadline);
    }
    if (present(entry.last_replay_ts_ms)) {
      const last = document.createElement('div');
      last.className = 'pm-line';
      last.textContent = `Last replay: ${agoMs(entry.last_replay_ts_ms)}`;
      div.appendChild(last);
    }
  } else if (kind === 'clean') {
    const total = Array.isArray(entry.replay_schedule_ms)
      ? entry.replay_schedule_ms.length
      : (present(entry.replays_done) ? entry.replays_done : '?');
    const line = document.createElement('div');
    line.className = 'pm-line green';
    line.textContent = `✓ All ${total} replays clean`;
    div.appendChild(line);
  } else if (kind === 'suspended') {
    if (present(entry.project_slug)) {
      const proj = document.createElement('div');
      proj.className = 'pm-line';
      proj.textContent = `Project: ${entry.project_slug}`;
      div.appendChild(proj);
    }
    const fail = document.createElement('div');
    fail.className = 'pm-line red';
    const exitCode = present(entry.exit_code) ? `, exit ${entry.exit_code}` : '';
    fail.textContent = `✗ ${safe(entry.failure_mode, 'unknown')}${exitCode}`;
    div.appendChild(fail);

    const callout = document.createElement('div');
    callout.className = 'pm-suspend-callout';
    callout.textContent = 'auto_push:false set in local.json — manual reset required';
    div.appendChild(callout);

    const hasStdout = present(entry.stdout_tail);
    const hasStderr = present(entry.stderr_tail);
    if (hasStdout || hasStderr) {
      const det = document.createElement('details');
      const sum = document.createElement('summary');
      sum.textContent = 'stdout / stderr tails';
      det.appendChild(sum);
      if (hasStdout) {
        const lbl = document.createElement('div');
        lbl.className = 'pm-tail-label';
        lbl.textContent = 'stdout_tail';
        det.appendChild(lbl);
        const pre = document.createElement('pre');
        pre.textContent = String(entry.stdout_tail);
        det.appendChild(pre);
      }
      if (hasStderr) {
        const lbl = document.createElement('div');
        lbl.className = 'pm-tail-label';
        lbl.textContent = 'stderr_tail';
        det.appendChild(lbl);
        const pre = document.createElement('pre');
        pre.textContent = String(entry.stderr_tail);
        det.appendChild(pre);
      }
      div.appendChild(det);
    }
  }

  return div;
}

// === Render ===

function render(gist) {
  const health = parseFile(gist, 'health.json');
  const fleetFiles = Object.keys(gist.files || {}).filter(f => f.startsWith('fleet-') && f.endsWith('.json'));
  // Pre-parse fleet snapshots once — used for both fleet-aggregate computation
  // (health banner) and individual machine cards. Each file is at most a
  // small JSON object; the cost of double-parsing was negligible but the
  // intermediate is also handy for the aggregate.
  const fleetSnaps = fleetFiles.map((f) => {
    const snap = parseFile(gist, f);
    snap.__file = f;
    return snap;
  });

  // Fleet-aggregate "last successful dispatch" — corrects under-reporting
  // when health.json is written by a host whose log is older than another
  // host's recent success (last writer wins on the gist).
  const fleetAgg = aggregateLastDispatch(fleetSnaps);

  // Health banner
  const hState = health.state || 'idle';
  const hReason = health.reason || '';
  const banner = document.getElementById('healthBanner');
  banner.innerHTML = '';

  const bannerDiv = document.createElement('div');
  bannerDiv.className = `health-banner ${hState}`;
  const dot = document.createElement('div');
  dot.className = 'health-dot';
  bannerDiv.appendChild(dot);

  const content = document.createElement('div');
  content.className = 'health-content';
  const stateLine = document.createElement('div');
  stateLine.textContent = `${String(hState).toUpperCase()}${hReason ? ' — ' + hReason : ''}`;
  content.appendChild(stateLine);

  // Diagnostic counts row — only when at least one count is non-zero
  const counts = [];
  if (Number(health.selector_fallback_count) > 0)
    counts.push(`selector_fallback_count: ${health.selector_fallback_count}`);
  if (Number(health.structural_failures) > 0)
    counts.push(`structural_failures: ${health.structural_failures}`);
  if (present(health.hours_since_success) && Number.isFinite(Number(health.hours_since_success))) {
    const hours = Number(health.hours_since_success);
    const h = Math.floor(hours);
    const m = Math.floor((hours - h) * 60);
    counts.push(`host last success: ${h}h ${m}m ago`);
  }
  // Fleet-aggregate row — only emit when it differs meaningfully from the
  // host-only number (same host or fleet has no history -> skip the noise).
  if (fleetAgg.ts) {
    const fleetMs = Date.now() - new Date(fleetAgg.ts).getTime();
    if (Number.isFinite(fleetMs) && fleetMs >= 0) {
      counts.push(`fleet last success: ${formatDuration(fleetMs)} (${fleetAgg.machine ?? '?'})`);
    }
  }
  if (counts.length > 0) {
    const cline = document.createElement('div');
    cline.className = 'health-counts';
    cline.textContent = counts.join('  •  ');
    content.appendChild(cline);
  }
  bannerDiv.appendChild(content);
  banner.appendChild(bannerDiv);

  // Pending-merges panel
  renderPendingMerges(gist);

  // Machine cards
  const machinesEl = document.getElementById('machines');
  machinesEl.innerHTML = '';

  for (const fleet of fleetSnaps) {
    const f = fleet.__file;
    const name = fleet.machine || f.replace(/^fleet-/, '').replace(/\.json$/, '');
    const state = machineState(fleet);

    const card = document.createElement('div');
    card.className = 'card';

    let rows = `
      <div class="card-title"><div class="machine-dot ${state}"></div>${esc(name)}</div>
      <div class="row"><span class="label">Last run</span><span class="value">${esc(ago(fleet.last_run_ts))}</span></div>
      <div class="row"><span class="label">Outcome</span><span class="value">${outcomeTag(fleet.last_run_outcome)}</span></div>`;

    // Skip-reason chip — when last_run was a skip and we have a reason, show
    // it inline. Helps distinguish "alive but gating" from "dead": the bot
    // is correctly idle because of weekly-reserve-floor, daily-quota, etc.
    if (fleet.last_run_outcome === 'skipped' && present(fleet.last_run_reason)) {
      rows += `<div class="row"><span class="label">Skip reason</span><span class="value warn">${esc(fleet.last_run_reason)}</span></div>`;
    }

    if (present(fleet.last_project)) {
      rows += `<div class="row"><span class="label">Project</span><span class="value accent">${esc(fleet.last_project)}</span></div>`;
      rows += `<div class="row"><span class="label">Task</span><span class="value">${esc(safe(fleet.last_task))}</span></div>`;
    }

    if (present(fleet.last_dispatch_ts)) {
      rows += `<div class="row"><span class="label">Last success</span><span class="value success">${esc(ago(fleet.last_dispatch_ts))}</span></div>`;
    }

    if (Number(fleet.consecutive_errors) > 0) {
      rows += `<div class="row"><span class="label">Errors</span><span class="value error">${esc(fleet.consecutive_errors)} consecutive</span></div>`;
    }

    if (present(fleet.last_error_reason) && Number(fleet.consecutive_errors) > 0) {
      rows += `<div class="row"><span class="label">Error</span><span class="value error">${esc(fleet.last_error_reason)}</span></div>`;
    }

    // Stale row — explicit text companion to the gray dot, so iPhone glances
    // get the "this machine hasn't checked in" signal without needing color.
    if (state === 'stale' && present(fleet.last_run_ts)) {
      rows += `<div class="row"><span class="label">Stale</span><span class="value warn">no heartbeat in ${esc(ago(fleet.last_run_ts))}</span></div>`;
    }

    card.innerHTML = rows;

    // Skip-reason hint (under the Skip row, before Error). Yellow-bordered
    // companion to errorHint, but for benign idling explanations.
    const sHint = skipReasonHint(fleet);
    if (sHint && fleet.last_run_outcome === 'skipped') {
      const sDiv = document.createElement('div');
      sDiv.className = 'skip-hint';
      sDiv.textContent = sHint;
      card.appendChild(sDiv);
    }

    // Daily-quota counter — append after rows, before burn bars. Only when
    // we actually have a count (new field; gracefully absent on old gist
    // files until each machine's wrapper next runs the new fleet.mjs).
    if (present(fleet.dispatches_today)) {
      card.appendChild(buildQuotaRow(Number(fleet.dispatches_today), fleet.dispatches_today_max));
    }

    // Burn bars — weekly first (the floor that gates dispatch), then 30-day
    // (context for whether the weekly-floor is biting because of a tight
    // month or just an exam-prep week). Estimator may be absent; gate
    // gracefully on null.
    if (present(fleet.weekly_pct) && Number.isFinite(Number(fleet.weekly_pct))) {
      card.appendChild(buildBurnBar('Weekly burn', Number(fleet.weekly_pct)));
    }
    if (present(fleet.monthly_pct) && Number.isFinite(Number(fleet.monthly_pct))) {
      card.appendChild(buildBurnBar('30-day burn', Number(fleet.monthly_pct)));
    }
    // Reset countdown — when the weekly gate is blocking and we know when
    // the window rolls forward, surface the wait. UTC-anchored so the
    // number matches the gate's own clock.
    if (fleet.weekly_gate_passes === false && present(fleet.weekly_hours_until_reset)) {
      const resetRow = document.createElement('div');
      resetRow.className = 'row';
      const lbl = document.createElement('span');
      lbl.className = 'label';
      lbl.textContent = 'Weekly resets in';
      const val = document.createElement('span');
      val.className = 'value warn';
      val.textContent = `${Math.round(Number(fleet.weekly_hours_until_reset))}h`;
      resetRow.appendChild(lbl);
      resetRow.appendChild(val);
      card.appendChild(resetRow);
    }

    // Phase-specific hint (under the Error row), DOM-built for safety
    const hint = errorHint(fleet.last_error_reason, fleet.last_error_detail);
    if (hint && Number(fleet.consecutive_errors) > 0) {
      const hintDiv = document.createElement('div');
      hintDiv.className = 'error-hint';
      hintDiv.textContent = hint;
      card.appendChild(hintDiv);
    }

    // Diagnostics drawer
    const drawer = buildDiagDrawer(fleet);
    if (drawer) card.appendChild(drawer);

    machinesEl.appendChild(card);
  }
}

// PWA install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'inline-block';
});
function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('installBtn').style.display = 'none';
  });
}
window.addEventListener('appinstalled', () => {
  document.getElementById('installBtn').style.display = 'none';
});

// Service worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Auto-refresh every 5 minutes
refresh();
setInterval(refresh, 300000);
</script>
